// LocalStorage compatibility layer (replaces window.storage for standalone use)
const storageShim = {
  get: async (key, shared) => {
    try {
      const prefix = shared ? "shared:" : "";
      const val = localStorage.getItem(prefix + key);
      if (val !== null) return { value: val };
      return null;
    } catch(e) { return null; }
  },
  set: async (key, value, shared) => {
    try {
      const prefix = shared ? "shared:" : "";
      localStorage.setItem(prefix + key, value);
      return { key, value, shared: !!shared };
    } catch(e) { return null; }
  },
  delete: async (key, shared) => {
    try {
      const prefix = shared ? "shared:" : "";
      localStorage.removeItem(prefix + key);
      return { key, deleted: true };
    } catch(e) { return null; }
  }
};
// Override window.storage for compatibility
if (!window.storage) window.storage = storageShim;

He was ordained young. He served in missions. He fed the hungry, healed the sick, and burned his offerings with a devotion that made senior clerics uneasy. Andreas did not merely follow the Precept of Offering — he embodied it. He gave too much. Slept too little. Burned his own food if someone hungrier arrived. His faith was not gentle. It was a furnace.`

And then there was the matter of the warmth.

The book's final chapter compiled eyewitness accounts of her inhuman heat, her lapses in breathing, her strange social detachment. It concluded something devastating: That she may have been genuine — and that this was the problem.

If Dolores Dei truly was something other, something that had walked among humanity for eons before choosing to intervene, then every institution she built, every kindness she inspired, every church erected in her name was not the product of human compassion — it was the product of interference. The Therrier had been right. Humanity was supposed to come up with this on its own.

He has not spoken of his doubts to the Order. He has not abandoned the faith. But he has begun to notice things: The way the Church discourages questions about Dolores Dei's campaigns. The way the hierarchy talks about "the Forgotten" as a concept rather than as people. The way his own hands feel warm even when he is cold inside.

He carries the banned book in the bottom of his pack, wrapped in oilcloth. He has read it four times.

function gm(s){if(s<=3)return-3;if(s<=5)return-2;if(s<=8)return-1;if(s<=12)return 0;if(s<=15)return 1;if(s<=17)return 2;return 3}
function fm(n){return n>=0?`+${n}`:`${n}`}
function rd(s){return Math.floor(Math.random()*s)+1}

const DEFAULT_CHAR = {
  name:"",charClass:"Cleric",race:"",alignment:"",look:"",level:1,xp:0,
  stats:{STR:8,DEX:8,CON:8,INT:8,WIS:16,CHA:8},
  debilities:{STR:false,DEX:false,CON:false,INT:false,WIS:false,CHA:false},
  currentHP:0,armor:0,coin:0,
  bonds:["","","",""],
  gear:[{name:"Dungeon Rations",weight:1,tags:"5 uses"},{name:"Holy Symbol",weight:0,tags:"divine"}],
  customMoves:[],notes:"",
  deityName:"",domain:"",precept:"",
  preparedSpells:{},ongoingSpells:[],advancedMoves:[],
  holdDefend:0,holdIntervention:0,
  portrait:ANDREA_PORTRAIT,
};

// Styles
const HD = "'Cinzel', serif";
const BD = "'EB Garamond', serif";
const PN = {background:"#1a1510",border:"1px solid #2a2015",borderRadius:10,padding:14,marginBottom:10};
const IP = {background:"#120e08",border:"1px solid #3a2e1e",borderRadius:6,color:"#e8d5b5",padding:"5px 9px",fontSize:13,fontFamily:BD};
const BT = {background:"#2a2015",border:"1px solid #4a3a20",borderRadius:6,color:"#c8a040",padding:"5px 12px",cursor:"pointer",fontFamily:HD,fontSize:11};
const BX = {...BT,color:"#a05040",borderColor:"#5a2020"};
const BG = {...BT,background:"#3a2a10",color:"#e8c050",borderColor:"#6a5020"};

function DiceOverlay({r,onClose}){
  const[sh,setSh]=useState(false);
  useEffect(()=>{setSh(true);const t=setTimeout(()=>{setSh(false);setTimeout(onClose,300)},4000);return()=>clearTimeout(t)},[]);
  const isDmg=r.isDamage;
  const o=isDmg?"dmg":r.total>=10?"hit":r.total>=7?"part":"miss";
  const lb=isDmg?"Damage/Healing":o==="hit"?"Strong Hit!":o==="part"?"Partial Success":"Miss \u2014 Mark XP!";
  const cl=isDmg?"#c084fc":o==="hit"?"#4ade80":o==="part"?"#facc15":"#f87171";
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,opacity:sh?1:0,transition:"opacity 0.3s",cursor:"pointer"}}>
      <div style={{background:"#1a1510",border:`2px solid ${cl}`,borderRadius:16,padding:"28px 44px",textAlign:"center",transform:sh?"scale(1)":"scale(0.8)",transition:"transform 0.3s",maxWidth:380}}>
        <div style={{fontSize:13,color:"#a89070",letterSpacing:2,textTransform:"uppercase",marginBottom:8,fontFamily:HD}}>{r.label}</div>
        <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:10}}>
          {r.dice.map((d,i)=>(<div key={i} style={{width:52,height:52,background:"#2a2015",border:"2px solid #5a4a30",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:700,color:"#e8d5b5",fontFamily:HD}}>{d}</div>))}
        </div>
        {r.modifier!==undefined&&<div style={{color:"#c8b090",fontSize:15}}>{r.dice.join(" + ")}{r.modifier>=0?` + ${r.modifier}`:` \u2212 ${Math.abs(r.modifier)}`}{r.penalty?` \u2212 ${r.penalty} ongoing`:""}</div>}
        <div style={{fontSize:44,fontWeight:800,color:cl,fontFamily:HD,lineHeight:1.1,marginTop:4}}>{r.total}</div>
        <div style={{fontSize:17,color:cl,fontWeight:600,fontFamily:HD,marginTop:2}}>{lb}</div>
      </div>
    </div>
  );
}

function SH({children,right}){
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,letterSpacing:3,color:"#8a7a60",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #3a2e1e",paddingBottom:5,marginBottom:10,marginTop:14}}><span>{children}</span>{right&&<span>{right}</span>}</div>;
}

function App(){
  const[c,setC]=useState(DEFAULT_CHAR);
  const[tab,setTab]=useState("character");
  const[dice,setDice]=useState(null);
  const[log,setLog]=useState([]);
  const[loaded,setLoaded]=useState(false);
  const[ss,setSS]=useState("");
  const[showQA,setShowQA]=useState(false);
  const[showSync,setShowSync]=useState(false);
  const[syncCode,setSyncCode]=useState("");
  const[pullCode,setPullCode]=useState("");
  const[syncStatus,setSyncStatus]=useState("");
  const[showRawExport,setShowRawExport]=useState(false);
  const[importText,setImportText]=useState("");
  const[storageOk,setStorageOk]=useState(null);

  useEffect(()=>{(async()=>{
    let storageWorks = false;
    try{const r=await window.storage.get("dw-char-v3");if(r?.value){const saved=JSON.parse(r.value);setC({...DEFAULT_CHAR,...saved,stats:{...DEFAULT_CHAR.stats,...(saved.stats||{})},debilities:{...DEFAULT_CHAR.debilities,...(saved.debilities||{})}})};storageWorks=true}catch(e){console.error("Storage load error:",e)}
    try{const r=await window.storage.get("dw-log-v3");if(r?.value)setLog(JSON.parse(r.value))}catch{}
    setStorageOk(storageWorks);
    setLoaded(true);
  })()},[]);

  const sv=useRef(null);
  useEffect(()=>{if(!loaded)return;if(sv.current)clearTimeout(sv.current);sv.current=setTimeout(async()=>{try{await window.storage.set("dw-char-v3",JSON.stringify(c));setSS("saved");setStorageOk(true);setTimeout(()=>setSS(""),2000)}catch(e){setSS("save-fail");setStorageOk(false);console.error("Save error:",e)}},600)},[c,loaded]);
  const saveLog=async l=>{try{await window.storage.set("dw-log-v3",JSON.stringify(l.slice(0,60)))}catch{}};

  const manualSave=async()=>{
    try{await window.storage.set("dw-char-v3",JSON.stringify(c));await saveLog(log);setSS("saved");setStorageOk(true);setTimeout(()=>setSS(""),2000)}
    catch(e){setSS("save-fail");setStorageOk(false)}
  };

  const genCode=()=>{const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let code="";for(let i=0;i<6;i++)code+=chars[Math.floor(Math.random()*chars.length)];return code};

  const pushSync=async()=>{
    setSyncStatus("pushing");
    const code=genCode();
    const data=JSON.stringify({character:c,log:log,ts:Date.now()});
    try{
      await window.storage.set("dw-sync:"+code,data,true);
      setSyncCode(code);setSyncStatus("pushed");
    }catch(e){setSyncStatus("push-fail");console.error("Push sync error:",e)}
  };

  const pullSync=async()=>{
    if(!pullCode.trim()||pullCode.trim().length!==6){setSyncStatus("bad-code");return}
    setSyncStatus("pulling");
    try{
      const r=await window.storage.get("dw-sync:"+pullCode.trim().toUpperCase(),true);
      if(r?.value){
        const data=JSON.parse(r.value);
        if(data.character){
          setC({...DEFAULT_CHAR,...data.character,stats:{...DEFAULT_CHAR.stats,...(data.character.stats||{})},debilities:{...DEFAULT_CHAR.debilities,...(data.character.debilities||{})}});
          if(data.log)setLog(data.log);
          setSyncStatus("pulled");setSS("imported");setTimeout(()=>setSS(""),2000);
        }else{setSyncStatus("bad-data")}
      }else{setSyncStatus("not-found")}
    }catch(e){setSyncStatus("pull-fail");console.error("Pull sync error:",e)}
  };

  const exportRaw=()=>{
    const data=JSON.stringify({character:c,log:log},null,2);
    setImportText(data);setShowRawExport(true);
    if(navigator.clipboard)navigator.clipboard.writeText(data).catch(()=>{});
  };

  const importRaw=()=>{
    try{
      const data=JSON.parse(importText);
      if(data.character){setC({...DEFAULT_CHAR,...data.character,stats:{...DEFAULT_CHAR.stats,...(data.character.stats||{})},debilities:{...DEFAULT_CHAR.debilities,...(data.character.debilities||{})}});if(data.log)setLog(data.log);setSS("imported");setShowSync(false);setImportText("");setShowRawExport(false);setTimeout(()=>setSS(""),2000)}
      else{setSyncStatus("bad-data")}
    }catch(e){setSyncStatus("bad-data")}
  };

  const up=(k,v)=>setC(p=>({...p,[k]:v}));
  const uS=(s,v)=>setC(p=>({...p,stats:{...p.stats,[s]:v}}));
  const tD=s=>setC(p=>({...p,debilities:{...p.debilities,[s]:!p.debilities[s]}}));
  const ci=CLASS_DATA[c.charClass]||null;
  const maxHP=ci?ci.baseHP+c.stats.CON:c.stats.CON;
  const maxLoad=ci?ci.load+gm(c.stats.STR):10+gm(c.stats.STR);
  const curLoad=(c.gear||[]).reduce((s,g)=>s+(g.weight||0),0);
  const xpNeed=c.level+7;
  const oPen=(c.ongoingSpells||[]).length;
  const sBudget=c.level+1;

  const doRoll=(label,stat,extra={})=>{
    const d1=rd(6),d2=rd(6);let mod=0;
    if(stat&&stat!=="Bond"&&stat!=="varies"&&stat!=="raw")mod=gm(c.stats[stat])+(c.debilities[stat]?-1:0);
    const pen=extra.penalty||0;
    const total=d1+d2+mod-pen;
    const r={label,dice:[d1,d2],modifier:stat==="raw"?undefined:mod,penalty:pen||undefined,total,isDamage:false,time:Date.now()};
    setDice(r);const nl=[r,...log].slice(0,60);setLog(nl);saveLog(nl);
  };

  const rollDmg=()=>{if(!ci)return;const s=parseInt(ci.damageDie.replace("d",""));const d=rd(s);const r={label:`Damage (${ci.damageDie})`,dice:[d],total:d,isDamage:true,time:Date.now()};setDice(r);const nl=[r,...log].slice(0,60);setLog(nl);saveLog(nl)};

  const rollHeal=(die,label)=>{const[cnt,sides]=die.split("d").map(Number);const rolls=Array.from({length:cnt||1},()=>rd(sides));const total=rolls.reduce((a,b)=>a+b,0);const r={label:label||`Heal (${die})`,dice:rolls,total,isDamage:true,time:Date.now()};setDice(r);const nl=[r,...log].slice(0,60);setLog(nl);saveLog(nl)};

  const addXP=(n=1)=>{let nx=c.xp+n,nl=c.level;while(nx>=nl+7){nx-=(nl+7);nl++}setC(p=>({...p,xp:nx,level:nl}))};

  const portraitRef=useRef(null);
  const handlePortrait=(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const img=new Image();
      img.onload=()=>{
        const maxW=400,maxH=500;
        let w=img.width,h=img.height;
        if(w>maxW){h=h*(maxW/w);w=maxW}
        if(h>maxH){w=w*(maxH/h);h=maxH}
        const canvas=document.createElement("canvas");
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        const b64=canvas.toDataURL("image/jpeg",0.85);
        up("portrait",b64);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const resetChar=async()=>{if(confirm("Reset character?")){setC(DEFAULT_CHAR);setLog([]);try{await window.storage.delete("dw-char-v3");await window.storage.delete("dw-log-v3")}catch{}}};

  const prepLvl=Object.entries(c.preparedSpells||{}).reduce((sum,[name,st])=>{
    if(!st.prepared)return sum;
    for(const[lvl,spells]of Object.entries(CLERIC_SPELLS)){if(lvl==="rote")continue;if(spells.find(s=>s.name===name))return sum+parseInt(lvl)}return sum;
  },0);

  const togglePrep=(name)=>setC(p=>{const ps={...(p.preparedSpells||{})};if(ps[name]?.prepared){delete ps[name];return{...p,preparedSpells:ps,ongoingSpells:(p.ongoingSpells||[]).filter(s=>s!==name)}}else{ps[name]={prepared:true,revoked:false};return{...p,preparedSpells:ps}}});
  const toggleRevoke=name=>setC(p=>{const ps={...(p.preparedSpells||{})};if(ps[name])ps[name]={...ps[name],revoked:!ps[name].revoked};return{...p,preparedSpells:ps,ongoingSpells:ps[name]?.revoked?(p.ongoingSpells||[]).filter(s=>s!==name):(p.ongoingSpells||[])}});
  const toggleOngoing=name=>setC(p=>{const os=(p.ongoingSpells||[]);return{...p,ongoingSpells:os.includes(name)?os.filter(s=>s!==name):[...os,name]}});
  const communeReset=()=>setC(p=>({...p,preparedSpells:{},ongoingSpells:[]}));
  const toggleAdv=name=>setC(p=>{const am=(p.advancedMoves||[]);return{...p,advancedMoves:am.includes(name)?am.filter(n=>n!==name):[...am,name]}});

  if(!loaded)return <div style={{color:"#e8d5b5",fontFamily:HD,padding:40,textAlign:"center"}}>Loading...</div>;

  const tabs=["character","spells","moves","gear","lore","world","reference","log"];

  return(
    <div style={{background:"linear-gradient(180deg,#0d0a06,#1a1510 25%,#1a1510 75%,#0d0a06)",minHeight:"100vh",color:"#e8d5b5",fontFamily:BD,padding:0}}>
      <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet"/>
      <style>{`*{box-sizing:border-box}input,select,textarea,button{font-family:inherit}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#3a2e1e;border-radius:3px}`}</style>

      <div style={{background:"linear-gradient(135deg,#1a1510,#2a2015)",borderBottom:"2px solid #3a2e1e",padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontFamily:HD,fontSize:20,fontWeight:800,color:"#c8a040",letterSpacing:3,lineHeight:1}}>DUNGEON WORLD</div><div style={{fontSize:10,color:"#6a5a40",letterSpacing:2,fontFamily:HD}}>CLERIC CHARACTER SHEET</div></div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {ss==="saved"&&<span style={{fontSize:10,color:"#4ade80",fontFamily:HD}}>{"\u2713"} Saved</span>}
          {ss==="imported"&&<span style={{fontSize:10,color:"#c084fc",fontFamily:HD}}>{"\u2713"} Loaded</span>}
          {ss==="save-fail"&&<span style={{fontSize:10,color:"#f87171",fontFamily:HD}}>{"\u2717"} Failed</span>}
          <button onClick={manualSave} style={BT}>Save</button>
          <button onClick={()=>{setShowSync(!showSync);setSyncStatus("");setSyncCode("");setPullCode("")}} style={{...BT,color:"#6aade8",borderColor:"#2a4a6a"}}>Sync</button>
          <button onClick={resetChar} style={BX}>Reset</button>
        </div>
      </div>

      {storageOk===false&&<div style={{background:"#3a1510",borderBottom:"1px solid #5a2020",padding:"8px 16px",fontSize:12,color:"#f87171"}}>
        Local storage unavailable. Use Sync to transfer your character between devices.
      </div>}

      {showSync&&<div style={{background:"#120e08",border:"1px solid #2a4a6a",margin:"10px 10px 0",borderRadius:10,padding:16,maxWidth:720,marginLeft:"auto",marginRight:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontFamily:HD,fontSize:14,color:"#6aade8",letterSpacing:2}}>SYNC ACROSS DEVICES</span>
          <button onClick={()=>{setShowSync(false);setShowRawExport(false);setImportText("")}} style={{...BX,fontSize:10,padding:"2px 8px"}}>{"\u2715"}</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div style={{background:"#1a1510",border:"1px solid #2a2015",borderRadius:8,padding:14}}>
            <div style={{fontFamily:HD,fontSize:12,color:"#c8a040",letterSpacing:1,marginBottom:8}}>PUSH (THIS DEVICE {"\u2192"} CODE)</div>
            <div style={{fontSize:12,color:"#a89070",marginBottom:10,lineHeight:1.4}}>Generate a 6-character sync code. Enter it on your other device to load this character.</div>
            <button onClick={pushSync} disabled={syncStatus==="pushing"} style={{...BG,width:"100%",padding:"8px 12px",fontSize:13}}>{syncStatus==="pushing"?"Generating...":"Generate Sync Code"}</button>
            {syncCode&&syncStatus==="pushed"&&<div style={{marginTop:12,textAlign:"center"}}>
              <div style={{fontSize:11,color:"#6a5a40",marginBottom:4}}>Your sync code:</div>
              <div style={{fontSize:32,fontWeight:800,fontFamily:HD,color:"#4ade80",letterSpacing:8,background:"#0d0a06",borderRadius:8,padding:"10px 16px",border:"2px solid #2a5a2a"}}>{syncCode}</div>
              <div style={{fontSize:11,color:"#6a5a40",marginTop:6}}>Code is temporary. Use it soon.</div>
            </div>}
            {syncStatus==="push-fail"&&<div style={{marginTop:8,fontSize:12,color:"#f87171"}}>Failed to generate sync code. Try the manual export below.</div>}
          </div>

          <div style={{background:"#1a1510",border:"1px solid #2a2015",borderRadius:8,padding:14}}>
            <div style={{fontFamily:HD,fontSize:12,color:"#c084fc",letterSpacing:1,marginBottom:8}}>PULL (CODE {"\u2192"} THIS DEVICE)</div>
            <div style={{fontSize:12,color:"#a89070",marginBottom:10,lineHeight:1.4}}>Enter the sync code from your other device to load that character here.</div>
            <div style={{display:"flex",gap:6}}>
              <input value={pullCode} onChange={e=>setPullCode(e.target.value.toUpperCase().slice(0,6))} placeholder="ABC123" maxLength={6} style={{...IP,flex:1,fontSize:18,fontFamily:HD,textAlign:"center",letterSpacing:4,textTransform:"uppercase"}}/>
              <button onClick={pullSync} disabled={pullCode.length!==6||syncStatus==="pulling"} style={{...BT,color:"#c084fc",borderColor:"#4a2a6a",padding:"8px 14px",opacity:pullCode.length===6?1:0.4}}>{syncStatus==="pulling"?"...":"Pull"}</button>
            </div>
            {syncStatus==="pulled"&&<div style={{marginTop:8,fontSize:12,color:"#4ade80"}}>{"\u2713"} Character loaded successfully!</div>}
            {syncStatus==="not-found"&&<div style={{marginTop:8,fontSize:12,color:"#f87171"}}>Code not found. Check the code and try again.</div>}
            {syncStatus==="bad-code"&&<div style={{marginTop:8,fontSize:12,color:"#f87171"}}>Enter a valid 6-character code.</div>}
            {syncStatus==="bad-data"&&<div style={{marginTop:8,fontSize:12,color:"#f87171"}}>Invalid sync data.</div>}
            {syncStatus==="pull-fail"&&<div style={{marginTop:8,fontSize:12,color:"#f87171"}}>Failed to connect. Try the manual import below.</div>}
          </div>
        </div>

        <div style={{borderTop:"1px solid #2a2015",paddingTop:10}}>
          <button onClick={()=>{if(showRawExport){setShowRawExport(false);setImportText("")}else{exportRaw()}}} style={{...BT,fontSize:10,color:"#7a6a50"}}>{showRawExport?"Hide":"Show"} Manual JSON Export/Import</button>
          {showRawExport&&<div style={{marginTop:10}}>
            <textarea value={importText} onChange={e=>setImportText(e.target.value)} rows={4} style={{...IP,width:"100%",resize:"vertical",fontSize:10,fontFamily:"monospace"}} placeholder="Paste exported JSON here to import..."/>
            <div style={{display:"flex",gap:6,marginTop:6}}>
              <button onClick={exportRaw} style={BG}>Copy Character JSON</button>
              <button onClick={importRaw} disabled={!importText.trim()} style={{...BT,opacity:importText.trim()?1:0.4}}>Import JSON</button>
            </div>
          </div>}
        </div>
      </div>}

      <div style={{display:"flex",padding:"6px 10px 0",borderBottom:"1px solid #4a3a20",overflowX:"auto",gap:0}}>
        {tabs.map(t=><button key={t} onClick={()=>setTab(t)} style={{background:tab===t?"#2a2015":"transparent",border:tab===t?"1px solid #4a3a20":"1px solid transparent",borderBottom:tab===t?"1px solid #2a2015":"1px solid #4a3a20",borderRadius:"7px 7px 0 0",padding:"7px 14px",color:tab===t?"#e8d5b5":"#7a6a50",fontSize:12,cursor:"pointer",fontFamily:HD,letterSpacing:1,fontWeight:tab===t?700:400}}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>)}
      </div>

      <div style={{padding:"10px 10px 50px",maxWidth:720,margin:"0 auto"}}>

      {tab==="character"&&<>
        {/* Portrait */}
        <div style={{...PN,textAlign:"center",position:"relative"}}>
          <img src={ANDREA_PORTRAIT} alt="Andreas Maler" style={{maxWidth:"100%",maxHeight:400,borderRadius:8,border:"2px solid #3a2e1e",display:"block",margin:"0 auto"}}/>
          <div style={{fontFamily:HD,fontSize:14,fontWeight:700,color:"#c8a040",letterSpacing:2,marginTop:8}}>ANDREAS MALER</div>
          <div style={{fontSize:11,color:"#6a5a40",fontFamily:HD,letterSpacing:1}}>Cleric of the Kindled Breath</div>
        </div>
        <div style={PN}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div style={{gridColumn:"1/-1"}}><label style={{fontSize:9,letterSpacing:1,color:"#7a6a50",textTransform:"uppercase",fontFamily:HD}}>Name</label><input value={c.name} onChange={e=>up("name",e.target.value)} style={{...IP,width:"100%"}}/></div>
            <div><label style={{fontSize:9,letterSpacing:1,color:"#7a6a50",textTransform:"uppercase",fontFamily:HD}}>Class</label><select value={c.charClass} onChange={e=>{up("charClass",e.target.value);up("race","");up("alignment","")}} style={{...IP,width:"100%"}}>{Object.keys(CLASS_DATA).map(k=><option key={k} value={k}>{k}</option>)}</select></div>
            <div><label style={{fontSize:9,letterSpacing:1,color:"#7a6a50",textTransform:"uppercase",fontFamily:HD}}>Race</label><select value={c.race} onChange={e=>up("race",e.target.value)} style={{...IP,width:"100%"}}><option value="">\u2014</option>{(ci?.races||[]).map(r=><option key={r} value={r}>{r}</option>)}</select></div>
            <div><label style={{fontSize:9,letterSpacing:1,color:"#7a6a50",textTransform:"uppercase",fontFamily:HD}}>Alignment</label><select value={c.alignment} onChange={e=>up("alignment",e.target.value)} style={{...IP,width:"100%"}}><option value="">\u2014</option>{(ci?.alignments||[]).map(a=><option key={a} value={a}>{a}</option>)}</select></div>
            <div><label style={{fontSize:9,letterSpacing:1,color:"#7a6a50",textTransform:"uppercase",fontFamily:HD}}>Level</label><input type="number" value={c.level} onChange={e=>up("level",Math.max(1,parseInt(e.target.value)||1))} style={{...IP,width:"100%"}}/></div>
          </div>
          <div style={{marginTop:8}}><label style={{fontSize:9,letterSpacing:1,color:"#7a6a50",textTransform:"uppercase",fontFamily:HD}}>Look</label><input value={c.look} onChange={e=>up("look",e.target.value)} placeholder="Eyes, hair, garb, body..." style={{...IP,width:"100%"}}/></div>
        </div>

        {c.charClass==="Cleric"&&<div style={PN}>
          <SH>Deity</SH>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div style={{gridColumn:"1/-1"}}><label style={{fontSize:9,letterSpacing:1,color:"#7a6a50",textTransform:"uppercase",fontFamily:HD}}>Deity Name</label><input value={c.deityName} onChange={e=>up("deityName",e.target.value)} placeholder="Helferth, Sucellus, Zorica..." style={{...IP,width:"100%"}}/></div>
            <div><label style={{fontSize:9,letterSpacing:1,color:"#7a6a50",textTransform:"uppercase",fontFamily:HD}}>Domain</label><select value={c.domain} onChange={e=>up("domain",e.target.value)} style={{...IP,width:"100%"}}><option value="">\u2014 Choose \u2014</option>{DOMAINS.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
            <div><label style={{fontSize:9,letterSpacing:1,color:"#7a6a50",textTransform:"uppercase",fontFamily:HD}}>Petition</label><select value={c.precept} onChange={e=>up("precept",e.target.value)} style={{...IP,width:"100%"}}><option value="">\u2014 Choose \u2014</option>{PRECEPTS.map(p=><option key={p.label} value={p.label}>{p.label} \u2014 {p.desc}</option>)}</select></div>
          </div>
        </div>}

        <div style={PN}>
          <SH right={<button onClick={()=>setShowQA(!showQA)} style={{...BT,fontSize:9,padding:"3px 8px"}}>Quick Assign</button>}>Ability Scores</SH>
          {showQA&&<QA onDone={a=>{STAT_NAMES.forEach((s,i)=>uS(s,a[i]));setShowQA(false)}}/>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
            {STAT_NAMES.map(s=>{const mod=gm(c.stats[s])+(c.debilities[s]?-1:0);return(
              <div key={s} style={{background:"#1e1810",border:"1px solid #3a2e1e",borderRadius:8,padding:"8px 6px",textAlign:"center"}}>
                <div style={{fontSize:9,letterSpacing:2,color:"#8a7a60",textTransform:"uppercase",fontFamily:HD}}>{STAT_FULL[s]}</div>
                <button onClick={()=>doRoll(`Roll +${s}`,s)} style={{background:"none",border:"none",cursor:"pointer",padding:0}} title={`Roll +${s}`}>
                  <div style={{fontSize:28,fontWeight:800,color:mod>0?"#c8a040":mod<0?"#a05040":"#c8b090",fontFamily:HD,lineHeight:1}}>{fm(mod)}</div>
                </button>
                <input type="number" value={c.stats[s]} onChange={e=>uS(s,parseInt(e.target.value)||0)} style={{width:40,...IP,textAlign:"center",fontSize:15,fontFamily:HD,marginTop:3}}/>
                <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3,marginTop:3,cursor:"pointer",fontSize:9,color:c.debilities[s]?"#a05040":"#5a4a30"}}><input type="checkbox" checked={c.debilities[s]} onChange={()=>tD(s)} style={{accentColor:"#a05040"}}/>{DEBILITIES[s]}</label>
              </div>
            )})}
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
          <div style={{...PN,textAlign:"center"}}>
            <div style={{fontSize:9,letterSpacing:2,color:"#8a7a60",textTransform:"uppercase",fontFamily:HD}}>HP</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5,marginTop:4}}>
              <button onClick={()=>up("currentHP",Math.max(0,c.currentHP-1))} style={{...BX,padding:"1px 8px",fontSize:16,lineHeight:1}}>{"\u2212"}</button>
              <span style={{fontSize:26,fontWeight:800,fontFamily:HD,color:c.currentHP<=maxHP*.25?"#f87171":c.currentHP<=maxHP*.5?"#facc15":"#4ade80"}}>{c.currentHP}</span>
              <button onClick={()=>up("currentHP",Math.min(maxHP,c.currentHP+1))} style={{...BG,padding:"1px 8px",fontSize:16,lineHeight:1}}>+</button>
            </div>
            <div style={{fontSize:10,color:"#6a5a40"}}>/ {maxHP}</div>
            <button onClick={()=>up("currentHP",maxHP)} style={{...BT,fontSize:9,marginTop:4,padding:"2px 8px"}}>Full</button>
          </div>
          <div style={{...PN,textAlign:"center"}}>
            <div style={{fontSize:9,letterSpacing:2,color:"#8a7a60",textTransform:"uppercase",fontFamily:HD}}>Armor</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5,marginTop:4}}>
              <button onClick={()=>up("armor",Math.max(0,c.armor-1))} style={{...BT,padding:"1px 8px",fontSize:16,lineHeight:1}}>{"\u2212"}</button>
              <span style={{fontSize:26,fontWeight:800,fontFamily:HD,color:"#6aade8"}}>{c.armor}</span>
              <button onClick={()=>up("armor",c.armor+1)} style={{...BT,padding:"1px 8px",fontSize:16,lineHeight:1}}>+</button>
            </div>
          </div>
          <div style={{...PN,textAlign:"center"}}>
            <div style={{fontSize:9,letterSpacing:2,color:"#8a7a60",textTransform:"uppercase",fontFamily:HD}}>Damage</div>
            <button onClick={rollDmg} style={{background:"none",border:"none",cursor:"pointer",padding:0,marginTop:4}}><span style={{fontSize:26,fontWeight:800,fontFamily:HD,color:"#f87171"}}>{ci?.damageDie||"?"}</span></button>
            <div style={{fontSize:9,color:"#6a5a40"}}>tap to roll</div>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          {[["Defend Hold","holdDefend","#6aade8"],["Divine Interv.","holdIntervention","#c084fc"]].map(([lb,k,cl])=>(
            <div key={k} style={{...PN,textAlign:"center"}}>
              <div style={{fontSize:9,letterSpacing:2,color:"#8a7a60",textTransform:"uppercase",fontFamily:HD}}>{lb}</div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:4}}>
                <button onClick={()=>up(k,Math.max(0,(c[k]||0)-1))} style={{...BT,padding:"1px 8px",fontSize:14}}>{"\u2212"}</button>
                <span style={{fontSize:24,fontWeight:700,fontFamily:HD,color:cl}}>{c[k]||0}</span>
                <button onClick={()=>up(k,(c[k]||0)+1)} style={{...BT,padding:"1px 8px",fontSize:14}}>+</button>
              </div>
            </div>
          ))}
        </div>

        <div style={PN}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><span style={{fontSize:9,letterSpacing:2,color:"#8a7a60",textTransform:"uppercase",fontFamily:HD}}>XP </span><span style={{fontSize:20,fontWeight:700,fontFamily:HD,color:"#c8a040"}}>{c.xp}<span style={{fontSize:13,color:"#6a5a40"}}> / {xpNeed}</span></span></div>
            <div style={{display:"flex",gap:5}}><button onClick={()=>addXP(1)} style={BG}>+1 XP</button><button onClick={()=>setC(p=>({...p,xp:Math.max(0,p.xp-1)}))} style={BT}>{"\u22121"}</button></div>
          </div>
          <div style={{background:"#120e08",borderRadius:5,height:6,marginTop:6,overflow:"hidden"}}><div style={{height:"100%",background:"linear-gradient(90deg,#8a6020,#c8a040)",borderRadius:5,width:`${(c.xp/xpNeed)*100}%`,transition:"width 0.3s"}}/></div>
        </div>

        <div style={{...PN,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><span style={{fontSize:9,letterSpacing:2,color:"#8a7a60",textTransform:"uppercase",fontFamily:HD}}>Coin </span><span style={{fontSize:20,fontWeight:700,fontFamily:HD,color:"#c8a040"}}>{c.coin}</span></div>
          <div style={{display:"flex",gap:4}}><button onClick={()=>up("coin",c.coin+1)} style={BG}>+1</button><button onClick={()=>up("coin",c.coin+10)} style={BG}>+10</button><button onClick={()=>up("coin",Math.max(0,c.coin-1))} style={BT}>{"\u22121"}</button></div>
        </div>

        <div style={PN}>
          <SH>Bonds</SH>
          {(c.bonds||[]).map((b,i)=>(<div key={i} style={{display:"flex",gap:6,marginBottom:5}}><input value={b} onChange={e=>{const nb=[...(c.bonds||[])];nb[i]=e.target.value;up("bonds",nb)}} placeholder="Enter a bond..." style={{...IP,flex:1}}/><button onClick={()=>up("bonds",(c.bonds||[]).filter((_,j)=>j!==i))} style={{...BX,padding:"2px 8px"}}>{"\u2715"}</button></div>))}
          <button onClick={()=>up("bonds",[...(c.bonds||[]),""])} style={BG}>+ Bond</button>
        </div>

        <div style={PN}><SH>Notes</SH><textarea value={c.notes} onChange={e=>up("notes",e.target.value)} rows={4} style={{...IP,width:"100%",resize:"vertical"}} placeholder="Session notes, backstory..."/></div>
      </>}

      {tab==="spells"&&<>
        {oPen>0&&<div style={{background:"#2a1a10",border:"1px solid #5a3020",borderRadius:8,padding:10,marginBottom:10}}>
          <div style={{fontSize:13,color:"#f0a050",fontWeight:600}}>Ongoing Spell Penalty: <span style={{fontFamily:HD,fontSize:16}}>{"\u2212"}{oPen}</span> to Cast a Spell</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:6}}>{(c.ongoingSpells||[]).map(s=><button key={s} onClick={()=>toggleOngoing(s)} style={{...BX,fontSize:10,padding:"2px 8px"}}>{s} {"\u2715"}</button>)}</div>
        </div>}

        <div style={{...PN,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div><span style={{fontSize:9,letterSpacing:2,color:"#8a7a60",textTransform:"uppercase",fontFamily:HD}}>Spell Levels </span><span style={{fontSize:20,fontWeight:700,fontFamily:HD,color:prepLvl>sBudget?"#f87171":"#c8a040"}}>{prepLvl}<span style={{fontSize:13,color:"#6a5a40"}}> / {sBudget}</span></span></div>
          <div style={{display:"flex",gap:6}}><button onClick={()=>doRoll("Cast a Spell",c.charClass==="Cleric"?"WIS":"INT",{penalty:oPen})} style={BG}>Roll Cast +WIS</button><button onClick={communeReset} style={BX}>Commune (Reset)</button></div>
        </div>

        {Object.entries(CLERIC_SPELLS).map(([lvl,spells])=>{
          const isR=lvl==="rote";const nL=isR?0:parseInt(lvl);const canA=isR||nL<=c.level;
          return(<div key={lvl} style={{...PN,opacity:canA?1:0.4}}>
            <SH>{isR?"Rotes (Always Prepared)":`Level ${lvl} Spells`}</SH>
            {spells.map(sp=>{const st=(c.preparedSpells||{})[sp.name];const isP=isR||st?.prepared;const isRv=st?.revoked;const isOn=(c.ongoingSpells||[]).includes(sp.name);
              return(<div key={sp.name} style={{background:isP?"#1e1a10":"#120e08",border:`1px solid ${isP?"#4a3a10":"#2a2015"}`,borderRadius:7,padding:"8px 10px",marginBottom:6,opacity:isRv?0.5:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flex:1,minWidth:0}}>
                    {!isR&&<input type="checkbox" checked={isP||false} onChange={()=>togglePrep(sp.name)} disabled={!canA||(!isP&&nL+prepLvl>sBudget)} style={{accentColor:"#c8a040",width:15,height:15,flexShrink:0}}/>}
                    <span style={{fontFamily:HD,fontWeight:700,color:isP?"#c8a040":"#7a6a50",fontSize:14}}>{sp.name}</span>
                    {sp.ongoing&&<span style={{fontSize:8,color:"#f0a050",background:"#2a1a10",padding:"1px 4px",borderRadius:3,fontFamily:HD,letterSpacing:1,flexShrink:0}}>ONGOING</span>}
                    {isRv&&<span style={{fontSize:8,color:"#f87171",background:"#2a1010",padding:"1px 4px",borderRadius:3,fontFamily:HD,flexShrink:0}}>REVOKED</span>}
                  </div>
                  <div style={{display:"flex",gap:3,flexShrink:0}}>
                    {isP&&sp.ongoing&&!isR&&<button onClick={()=>toggleOngoing(sp.name)} style={{...BT,fontSize:9,padding:"2px 6px",color:isOn?"#f0a050":"#7a6a50",borderColor:isOn?"#5a3020":"#3a2e1e"}}>{isOn?"Active":"Track"}</button>}
                    {isP&&!isR&&<button onClick={()=>toggleRevoke(sp.name)} style={{...BX,fontSize:9,padding:"2px 6px"}}>{isRv?"Restore":"Revoke"}</button>}
                    {sp.healDie&&<button onClick={()=>rollHeal(sp.healDie,sp.name)} style={{...BG,fontSize:9,padding:"2px 6px"}}>Roll</button>}
                  </div>
                </div>
                <div style={{fontSize:12,color:"#a89070",marginTop:3,lineHeight:1.4}}>{sp.desc}</div>
              </div>)})}
          </div>)})}

        <div style={PN}><SH>Advanced Moves (2-5)</SH>{ADV_2_5.map(m=><label key={m.name} style={{display:"flex",gap:8,padding:"5px 0",borderBottom:"1px solid #1e1810",cursor:"pointer",alignItems:"flex-start"}}><input type="checkbox" checked={(c.advancedMoves||[]).includes(m.name)} onChange={()=>toggleAdv(m.name)} style={{accentColor:"#c8a040",marginTop:3,width:14,height:14}}/><div><div style={{fontFamily:HD,fontWeight:700,color:(c.advancedMoves||[]).includes(m.name)?"#c8a040":"#a89070",fontSize:13}}>{m.name}</div><div style={{fontSize:12,color:"#7a6a50",lineHeight:1.3}}>{m.desc}</div></div></label>)}</div>
        <div style={PN}><SH>Advanced Moves (6-10)</SH>{ADV_6_10.map(m=><label key={m.name} style={{display:"flex",gap:8,padding:"5px 0",borderBottom:"1px solid #1e1810",cursor:"pointer",alignItems:"flex-start"}}><input type="checkbox" checked={(c.advancedMoves||[]).includes(m.name)} onChange={()=>toggleAdv(m.name)} style={{accentColor:"#c084fc",marginTop:3,width:14,height:14}}/><div><div style={{fontFamily:HD,fontWeight:700,color:(c.advancedMoves||[]).includes(m.name)?"#c084fc":"#a89070",fontSize:13}}>{m.name}</div><div style={{fontSize:12,color:"#7a6a50",lineHeight:1.3}}>{m.desc}</div></div></label>)}</div>
      </>}

      {tab==="moves"&&<>
        {c.charClass==="Cleric"&&<div style={PN}><SH>Cleric Starting Moves</SH>
          {CLERIC_STARTING.map((m,i)=>(<div key={i} style={{background:"#120e08",border:"1px solid #2a2015",borderRadius:7,padding:10,marginBottom:6,cursor:m.stat?"pointer":"default"}} onClick={()=>{if(m.stat)doRoll(m.name,m.stat,m.usePenalty?{penalty:oPen}:{})}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontFamily:HD,fontWeight:700,color:"#c8a040",fontSize:14}}>{m.name}</span>{m.stat&&<span style={{fontSize:10,color:"#6a5a40",fontFamily:HD,background:"#1a1510",padding:"1px 6px",borderRadius:3}}>+{m.stat}{m.usePenalty&&oPen>0?` (\u2212${oPen})`:""}</span>}</div>
            <div style={{fontSize:12,color:"#a89070",marginTop:3,lineHeight:1.4}}>{m.desc}</div>
          </div>))}
        </div>}

        <div style={PN}><SH>Basic Moves</SH>
          {BASIC_MOVES.map((m,i)=>(<div key={i} style={{background:"#120e08",border:"1px solid #2a2015",borderRadius:7,padding:10,marginBottom:6,cursor:m.stat!=="varies"&&m.stat!=="Bond"?"pointer":"default"}} onClick={()=>{if(m.stat!=="varies"&&m.stat!=="Bond")doRoll(m.name,m.stat)}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontFamily:HD,fontWeight:700,color:"#c8a040",fontSize:14}}>{m.name}</span><span style={{fontSize:10,color:"#6a5a40",fontFamily:HD,background:"#1a1510",padding:"1px 6px",borderRadius:3}}>{m.stat==="varies"?"STR/DEX/CON/INT/WIS/CHA":`+${m.stat}`}</span></div>
            <div style={{fontSize:12,color:"#a89070",marginTop:3,lineHeight:1.4}}>{m.desc}</div>
            {m.stat==="varies"&&<div style={{display:"flex",gap:3,marginTop:6,flexWrap:"wrap"}}>{STAT_NAMES.map(s=><button key={s} onClick={e=>{e.stopPropagation();doRoll(`Defy Danger (+${s})`,s)}} style={{...BT,fontSize:9,padding:"2px 7px"}}>+{s}</button>)}</div>}
            {m.stat==="Bond"&&<button onClick={e=>{e.stopPropagation();doRoll(m.name,"Bond")}} style={{...BG,fontSize:9,marginTop:6,padding:"2px 8px"}}>Roll 2d6</button>}
          </div>))}
        </div>

        <div style={PN}><SH>Special Moves</SH>
          {SPECIAL_MOVES.map((m,i)=>(<div key={i} style={{background:"#120e08",border:"1px solid #2a2015",borderRadius:7,padding:10,marginBottom:6,cursor:m.stat==="raw"?"pointer":"default"}} onClick={()=>{if(m.stat==="raw")doRoll(m.name,"raw")}}>
            <div style={{fontFamily:HD,fontWeight:700,color:m.name==="Last Breath"?"#f87171":"#c8a040",fontSize:14}}>{m.name}</div>
            <div style={{fontSize:12,color:"#a89070",marginTop:3,lineHeight:1.4}}>{m.desc}</div>
          </div>))}
        </div>

        <div style={PN}><SH right={<button onClick={()=>up("customMoves",[...(c.customMoves||[]),{name:"",desc:""}])} style={BG}>+ Add</button>}>Custom Moves</SH>
          {(c.customMoves||[]).map((m,i)=>(<div key={i} style={{background:"#120e08",border:"1px solid #2a2015",borderRadius:7,padding:8,marginBottom:6}}>
            <div style={{display:"flex",gap:6,alignItems:"center"}}><input value={m.name} onChange={e=>{const nm=[...(c.customMoves||[])];nm[i]={...nm[i],name:e.target.value};up("customMoves",nm)}} placeholder="Move name" style={{...IP,flex:1,fontFamily:HD,fontWeight:700,color:"#c8a040",fontSize:14,background:"transparent",border:"none"}}/><button onClick={()=>up("customMoves",(c.customMoves||[]).filter((_,j)=>j!==i))} style={{...BX,padding:"2px 7px"}}>{"\u2715"}</button></div>
            <textarea value={m.desc} onChange={e=>{const nm=[...(c.customMoves||[])];nm[i]={...nm[i],desc:e.target.value};up("customMoves",nm)}} placeholder="Description..." rows={2} style={{...IP,width:"100%",background:"transparent",border:"none",resize:"vertical",marginTop:2}}/>
          </div>))}
        </div>

        <div style={PN}><SH>Quick Roll</SH><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {STAT_NAMES.map(s=>{const mod=gm(c.stats[s])+(c.debilities[s]?-1:0);return <button key={s} onClick={()=>doRoll(`Roll +${s}`,s)} style={{...BG,minWidth:65}}>+{s} ({fm(mod)})</button>})}
          <button onClick={rollDmg} style={{...BX,minWidth:65}}>Dmg ({ci?.damageDie})</button>
        </div></div>
      </>}

      {tab==="gear"&&<div style={PN}>
        <SH right={<span style={{fontFamily:HD,fontSize:12,color:curLoad>maxLoad?"#f87171":"#c8a040"}}>Load: {curLoad} / {maxLoad}</span>}>Inventory</SH>
        {curLoad>maxLoad&&<div style={{background:"#3a1510",border:"1px solid #5a2020",borderRadius:5,padding:6,marginBottom:8,fontSize:11,color:"#f87171"}}>Encumbered! {"\u22121"} ongoing.</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 50px 1fr 26px",gap:4,fontSize:9,color:"#6a5a40",fontFamily:HD,letterSpacing:1,textTransform:"uppercase",marginBottom:3,padding:"0 3px"}}><span>Item</span><span>Wt</span><span>Tags</span><span></span></div>
        {(c.gear||[]).map((g,i)=>(<div key={i} style={{display:"grid",gridTemplateColumns:"1fr 50px 1fr 26px",gap:4,marginBottom:3}}>
          <input value={g.name} onChange={e=>{const ng=[...(c.gear||[])];ng[i]={...ng[i],name:e.target.value};up("gear",ng)}} style={{...IP,fontSize:12}}/>
          <input type="number" value={g.weight} onChange={e=>{const ng=[...(c.gear||[])];ng[i]={...ng[i],weight:parseInt(e.target.value)||0};up("gear",ng)}} style={{...IP,fontSize:12,textAlign:"center"}}/>
          <input value={g.tags} onChange={e=>{const ng=[...(c.gear||[])];ng[i]={...ng[i],tags:e.target.value};up("gear",ng)}} placeholder="close, 1 armor..." style={{...IP,fontSize:12,color:"#a89070"}}/>
          <button onClick={()=>up("gear",(c.gear||[]).filter((_,j)=>j!==i))} style={{...BX,padding:"1px 5px",fontSize:11}}>{"\u2715"}</button>
        </div>))}
        <button onClick={()=>up("gear",[...(c.gear||[]),{name:"",weight:0,tags:""}])} style={{...BG,marginTop:6}}>+ Add Item</button>
      </div>}

      {tab==="lore"&&<>
        <div style={{textAlign:"center",padding:"16px 0 6px"}}>
          <div style={{fontSize:11,letterSpacing:4,color:"#6a5a40",textTransform:"uppercase",fontFamily:HD}}>The Story of</div>
          <div style={{fontFamily:HD,fontSize:22,fontWeight:800,color:"#c8a040",letterSpacing:3,lineHeight:1.2}}>ANDREAS MALER</div>
          <div style={{fontSize:12,color:"#a89070",fontStyle:"italic",marginTop:4}}>Cleric of the Order of the Kindled Breath</div>
          <div style={{width:60,height:1,background:"linear-gradient(90deg,transparent,#4a3a20,transparent)",margin:"10px auto 0"}}/>
        </div>
        <div style={{textAlign:"center",padding:"6px 0 12px"}}>
          <div style={{fontSize:12,color:"#8a7a60",fontStyle:"italic",lineHeight:1.5,maxWidth:500,margin:"0 auto"}}>"After suffering, relief. After darkness, light. After the grey, world again."</div>
          <div style={{fontSize:10,color:"#5a4a30",marginTop:2}}>— The Dolorian Leitmotiv</div>
        </div>
        {LORE_SECTIONS.map((section,i)=>(
          <div key={i} style={PN}>
            <div style={{display:"flex",alignItems:"center",gap:8,fontSize:14,letterSpacing:2,color:"#c8a040",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #3a2e1e",paddingBottom:6,marginBottom:10}}>
              <span style={{fontSize:18}}>{section.icon}</span>
              <span style={{fontWeight:700}}>{section.title}</span>
            </div>
            {section.content.split("\n\n").map((para,j)=>(
              <p key={j} style={{fontSize:13,color:"#c8b898",lineHeight:1.65,margin:"0 0 10px",textAlign:"justify",textIndent:para.startsWith('"')?"0":"1.5em"}}>{para}</p>
            ))}
          </div>
        ))}
      </>}

      {tab==="world"&&<>
        <div style={{textAlign:"center",padding:"16px 0 12px"}}>
          <div style={{fontFamily:HD,fontSize:18,fontWeight:800,color:"#c8a040",letterSpacing:3}}>WORLD & ARTIFACTS</div>
          <div style={{fontSize:11,color:"#6a5a40",letterSpacing:2,fontFamily:HD,marginTop:2}}>THE ICONS OF ANDREAS'S FAITH</div>
        </div>

        {/* Dolores Dei */}
        <div style={PN}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,letterSpacing:2,color:"#f0d060",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #5a4a20",paddingBottom:5,marginBottom:12}}>
            <span style={{fontWeight:700}}>Dolores Dei — The Innocence</span>
          </div>
          <div style={{textAlign:"center",marginBottom:14}}>
            <img src={DOLORES_DEI_IMG} alt="Dolores Dei" style={{maxWidth:"100%",maxHeight:500,borderRadius:8,border:"2px solid #3a2e1e",display:"block",margin:"0 auto"}}/>
          </div>
          <div style={{padding:"0 4px"}}>
            <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>Dolores Dei — <span style={{fontStyle:"italic",color:"#f0d060"}}>"God's Sorrows"</span> — the most well-known Innocence, and the figurehead of Dolorianism. She ruled three hundred years ago. A woman of the court, the wife of a marchese, and eventually the principal advisor to a queen. Gorgeous beyond beauty. Terribly.</p>
            <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>When her Innocence was declared — and the queen she had advised for years fell on her knees before her — she was so overcome with emotion that her lungs began to glow through her chest. Golden filaments lit up the chamber around her. That is why the lungs are the symbol of love.</p>
            <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>She was also unnaturally warm. Like a furnace. She sometimes forgot to breathe for over ten minutes. She adored chess — but also military war games. She suppressed dissenters with a force she called The Army of Humanity. Some would call her a war criminal. The answer, most likely, is both visionary and monster.</p>
            <p style={{fontSize:13,color:"#f87171",lineHeight:1.6,margin:0,fontStyle:"italic"}}>After twenty-two years, one of her own bodyguards shot her eight times in the chest. Before he was seized, he screamed: "We were supposed to come up with this ourselves!"</p>
          </div>
        </div>

        {/* Holy Symbol */}
        <div style={PN}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,letterSpacing:2,color:"#c8a040",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #4a3a20",paddingBottom:5,marginBottom:12}}>
            <span style={{fontWeight:700}}>The Radiant Lungs — Holy Symbol</span>
          </div>
          <div style={{textAlign:"center",marginBottom:14}}>
            <img src={HOLYSYMBOL_IMG} alt="The Radiant Lungs" style={{maxWidth:"100%",maxHeight:440,borderRadius:8,border:"2px solid #3a2e1e",display:"block",margin:"0 auto"}}/>
          </div>
          <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>A pendant of two lungs wreathed in golden filaments — the universal symbol of Dolorian love. Andreas wears his on a tarnished chain beneath his vestments.</p>
          <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:0}}>When Dolores Dei was crowned Innocence, her lungs glowed through her chest with golden light. Ever since, the lungs have been the symbol of love for the cultures of the world. Andreas's symbol is old, battered, and warm to the touch — always warm.</p>
        </div>

        {/* Church of Humanity */}
        <div style={PN}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,letterSpacing:2,color:"#e8e0d0",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #3a3a3a",paddingBottom:5,marginBottom:12}}>
            <span style={{fontWeight:700}}>The Church of Humanity</span>
          </div>
          <div style={{textAlign:"center",marginBottom:14}}>
            <img src={CHURCH_IMG} alt="Church of Humanity" style={{maxWidth:"100%",maxHeight:440,borderRadius:8,border:"2px solid #3a2e1e",display:"block",margin:"0 auto"}}/>
          </div>
          <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>Dolorian churches are built in a distinctive style — vertical, thin, and white — with intricate spires and arches reaching upward like hands grasping for the sun.</p>
          <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>The central fixture is always a stained glass window depicting Dolores Dei, her glowing lungs visible through her dress, casting the nave in amber and apricot light.</p>
          <p style={{fontSize:13,color:"#a89070",lineHeight:1.6,margin:0,fontStyle:"italic"}}>A Church of Humanity that does not serve the poor has failed its purpose.</p>
        </div>

        {/* The Banned Text */}
        <div style={PN}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,letterSpacing:2,color:"#f87171",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #5a2020",paddingBottom:5,marginBottom:12}}>
            <span style={{fontWeight:700}}>The Banned Text</span>
          </div>
          <div style={{textAlign:"center",marginBottom:14}}>
            <img src={BANNED_IMG} alt="The Banned Text" style={{maxWidth:"100%",maxHeight:440,borderRadius:8,border:"2px solid #3a2e1e",display:"block",margin:"0 auto"}}/>
          </div>
          <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>A banned theological text, wrapped in oilcloth at the bottom of Andreas's pack. Not aggressively suppressed — just quietly removed from church libraries.</p>
          <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>It argues that Dolores Dei's campaigns were calculated political consolidation, that the mass resettlements were ethnic cleansings with better branding, and that the Church has systematically erased her atrocities.</p>
          <p style={{fontSize:13,color:"#f87171",lineHeight:1.6,margin:0,fontStyle:"italic"}}>Its final chapter asks the devastating question: what if she was genuine — and that was the problem?</p>
        </div>

        {/* The Offering Bowl */}
        <div style={PN}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,letterSpacing:2,color:"#f0a050",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #5a3020",paddingBottom:5,marginBottom:12}}>
            <span style={{fontWeight:700}}>The Clay Offering Bowl</span>
          </div>
          <div style={{textAlign:"center",marginBottom:14}}>
            <img src={OFFERING_IMG} alt="The Offering Bowl" style={{maxWidth:"100%",maxHeight:440,borderRadius:8,border:"2px solid #3a2e1e",display:"block",margin:"0 auto"}}/>
          </div>
          <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>Offerings are always burned. A coin dropped into a brazier. A letter fed to a candle. Bandages soaked in oil and set alight after they've done their healing work.</p>
          <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>The Dolorian offering says: <span style={{fontStyle:"italic",color:"#f0a050"}}>I had this, and I gave it to the fire, so that someone colder than me might feel its warmth.</span></p>
          <p style={{fontSize:13,color:"#a89070",lineHeight:1.6,margin:0}}>The most devout have burned everything they own — walking into the next chapter of their lives with nothing but faith and furnace-warm hands.</p>
        </div>

        {/* The Tin Soldier */}
        <div style={PN}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,letterSpacing:2,color:"#a0a8b0",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #3a3a4a",paddingBottom:5,marginBottom:12}}>
            <span style={{fontWeight:700}}>The Tin Soldier — Icon of Dolores Dei</span>
          </div>
          <div style={{textAlign:"center",marginBottom:14}}>
            <img src={TIN_SOLDIER_IMG} alt="The Tin Soldier" style={{maxWidth:"100%",maxHeight:440,borderRadius:8,border:"2px solid #3a2e1e",display:"block",margin:"0 auto"}}/>
          </div>
          <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>In her icons, Dolores Dei often holds a tiny tin soldier between her index finger and thumb — as if weighing the worth of a single life.</p>
          <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>She adored chess, yes — but also military war games. There was something ominous about her that people seldom mention, but <span style={{fontStyle:"italic"}}>feel</span> when they think of her.</p>
          <p style={{fontSize:13,color:"#a89070",lineHeight:1.6,margin:0}}>Her colours are silver, white, and apricot — winter colours. Beautiful and cold.</p>
        </div>

        {/* The Therrier's Cry */}
        <div style={PN}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,letterSpacing:2,color:"#c084fc",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #4a2a6a",paddingBottom:5,marginBottom:12}}>
            <span style={{fontWeight:700}}>The Therrier's Cry — The Seed of Doubt</span>
          </div>
          <div style={{textAlign:"center",marginBottom:14}}>
            <img src={THERRIER_IMG} alt="The Therrier's Cry" style={{maxWidth:"100%",maxHeight:440,borderRadius:8,border:"2px solid #3a2e1e",display:"block",margin:"0 auto"}}/>
          </div>
          <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>A young Therrier — one of Dolores Dei's own bodyguards — loaded a fowling piece and shot her eight times in the chest. He believed she was not human. Something ancient that had decided to interfere in the course of history.</p>
          <p style={{fontSize:13,color:"#c8b898",lineHeight:1.6,margin:"0 0 8px"}}>He was declared insane. But the glowing lungs were real. The inhuman warmth was witnessed by many.</p>
          <p style={{fontSize:13,color:"#c084fc",lineHeight:1.6,margin:0,fontWeight:600,fontStyle:"italic"}}>If she wasn't human — then who answers when Andreas prays?</p>
        </div>

        {/* Sacred Colors */}
        <div style={PN}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,letterSpacing:2,color:"#c8a040",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #4a3a20",paddingBottom:5,marginBottom:12}}>
            <span style={{fontWeight:700}}>The Sacred Colours of Dolorianism</span>
          </div>
          <div style={{display:"flex",gap:12,justifyContent:"center",padding:"10px 0 6px"}}>
            {[{c:"#c8c0b8",n:"Silver",d:"The crown, the spires"},{c:"#f0ece4",n:"White",d:"Her dress, the churches"},{c:"#e8a860",n:"Apricot",d:"The glow, the stained glass"}].map((col,i)=>(
              <div key={i} style={{textAlign:"center",flex:1}}>
                <div style={{width:"100%",height:60,background:col.c,borderRadius:6,border:"1px solid #3a2e1e",marginBottom:6}}/>
                <div style={{fontFamily:HD,fontSize:11,color:"#c8b898",letterSpacing:1}}>{col.n}</div>
                <div style={{fontSize:10,color:"#6a5a40",fontStyle:"italic"}}>{col.d}</div>
              </div>
            ))}
          </div>
          <p style={{fontSize:13,color:"#a89070",lineHeight:1.6,margin:"8px 0 0",textAlign:"center",fontStyle:"italic"}}>Winter colours. Beautiful and cold.</p>
        </div>
      </>}

      {tab==="reference"&&<>
        <div style={{textAlign:"center",padding:"16px 0 12px"}}>
          <div style={{fontFamily:HD,fontSize:18,fontWeight:800,color:"#c8a040",letterSpacing:3}}>QUICK REFERENCE</div>
          <div style={{fontSize:11,color:"#6a5a40",letterSpacing:2,fontFamily:HD,marginTop:2}}>AT-A-GLANCE CHARACTER GUIDE</div>
        </div>

        <div style={PN}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,letterSpacing:2,color:"#6aade8",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #2a4a6a",paddingBottom:5,marginBottom:10}}>
            <span style={{fontSize:16}}>⚜</span><span style={{fontWeight:700}}>Identity</span>
          </div>
          {QUICK_REF.identity.map((item,i)=>(
            <div key={i} style={{display:"flex",gap:8,padding:"5px 0",borderBottom:"1px solid #1e1810"}}>
              <span style={{fontSize:11,color:"#6a5a40",fontFamily:HD,letterSpacing:1,minWidth:80,flexShrink:0,textTransform:"uppercase"}}>{item.label}</span>
              <span style={{fontSize:13,color:"#e8d5b5",lineHeight:1.4}}>{item.value}</span>
            </div>
          ))}
        </div>

        <div style={PN}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,letterSpacing:2,color:"#f0a050",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #5a3020",paddingBottom:5,marginBottom:10}}>
            <span style={{fontSize:16}}>🔥</span><span style={{fontWeight:700}}>Faith & Worship</span>
          </div>
          {QUICK_REF.faith.map((item,i)=>(
            <div key={i} style={{display:"flex",gap:8,padding:"5px 0",borderBottom:"1px solid #1e1810"}}>
              <span style={{fontSize:11,color:"#6a5a40",fontFamily:HD,letterSpacing:1,minWidth:80,flexShrink:0,textTransform:"uppercase"}}>{item.label}</span>
              <span style={{fontSize:13,color:"#e8d5b5",lineHeight:1.4,fontStyle:item.label==="Leitmotiv"?"italic":"normal"}}>{item.value}</span>
            </div>
          ))}
        </div>

        <div style={PN}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,letterSpacing:2,color:"#c084fc",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #4a2a6a",paddingBottom:5,marginBottom:10}}>
            <span style={{fontSize:16}}>🕯</span><span style={{fontWeight:700}}>Personality & Tension</span>
          </div>
          {QUICK_REF.personality.map((item,i)=>(
            <div key={i} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:"1px solid #1e1810"}}>
              <span style={{fontSize:11,color:"#6a5a40",fontFamily:HD,letterSpacing:1,minWidth:80,flexShrink:0,textTransform:"uppercase"}}>{item.label}</span>
              <span style={{fontSize:13,color:"#e8d5b5",lineHeight:1.4,fontStyle:item.label.includes("Question")||item.label.includes("Tension")?"italic":"normal"}}>{item.value}</span>
            </div>
          ))}
        </div>

        <div style={PN}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,letterSpacing:2,color:"#c8a040",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #4a3a20",paddingBottom:5,marginBottom:10}}>
            <span style={{fontSize:16}}>☀</span><span style={{fontWeight:700}}>Dolores Dei — The Innocence</span>
          </div>
          {QUICK_REF.doloresDei.map((item,i)=>(
            <div key={i} style={{display:"flex",gap:8,padding:"5px 0",borderBottom:"1px solid #1e1810"}}>
              <span style={{fontSize:11,color:"#6a5a40",fontFamily:HD,letterSpacing:1,minWidth:80,flexShrink:0,textTransform:"uppercase"}}>{item.label}</span>
              <span style={{fontSize:13,color:"#e8d5b5",lineHeight:1.4,fontStyle:item.label.includes("Cry")?"italic":"normal"}}>{item.value}</span>
            </div>
          ))}
        </div>

        <div style={PN}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,letterSpacing:2,color:"#4ade80",textTransform:"uppercase",fontFamily:HD,borderBottom:"1px solid #1a4a1a",paddingBottom:5,marginBottom:10}}>
            <span style={{fontSize:16}}>⛤</span><span style={{fontWeight:700}}>Roleplay Hooks</span>
          </div>
          {QUICK_REF.rpHooks.map((item,i)=>(
            <div key={i} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:"1px solid #1e1810"}}>
              <span style={{fontSize:11,color:"#6a5a40",fontFamily:HD,letterSpacing:1,minWidth:80,flexShrink:0,textTransform:"uppercase"}}>{item.label}</span>
              <span style={{fontSize:13,color:"#e8d5b5",lineHeight:1.4}}>{item.value}</span>
            </div>
          ))}
        </div>
      </>}

      {tab==="log"&&<div style={PN}>
        <SH right={<button onClick={()=>{setLog([]);saveLog([])}} style={BX}>Clear</button>}>Roll History</SH>
        {log.length===0&&<div style={{color:"#6a5a40",fontStyle:"italic",padding:16,textAlign:"center"}}>No rolls yet.</div>}
        {log.map((r,i)=>{const o=r.isDamage?"dmg":r.total>=10?"hit":r.total>=7?"part":"miss";const cl=o==="hit"?"#4ade80":o==="part"?"#facc15":"#f87171";
          return(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #1e1810"}}>
            <div><span style={{fontFamily:HD,fontWeight:600,color:"#c8b090",fontSize:13}}>{r.label}</span><span style={{color:"#6a5a40",fontSize:11,marginLeft:6}}>[{r.dice.join(",")}]{r.modifier!==undefined?` ${fm(r.modifier)}`:""}{r.penalty?` \u2212${r.penalty}`:""}</span></div>
            <span style={{fontFamily:HD,fontWeight:800,fontSize:17,color:cl}}>{r.total}</span>
          </div>)})}
      </div>}

      </div>
      {dice&&<DiceOverlay r={dice} onClose={()=>setDice(null)}/>}
    </div>
  );
}

function QA({onDone}){
  const[a,setA]=useState({});
  const assign=(stat,score)=>setA(prev=>{const cl=Object.fromEntries(Object.entries(prev).filter(([,v])=>v!==score));return{...cl,[stat]:score}});
  const ok=STAT_NAMES.every(s=>a[s]!==undefined);
  return(<div style={{background:"#120e08",border:"1px solid #3a2e1e",borderRadius:7,padding:10,marginBottom:10}}>
    <div style={{fontSize:11,color:"#a89070",marginBottom:6}}>Assign 16, 15, 13, 12, 9, 8:</div>
    {STAT_NAMES.map(s=>(<div key={s} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
      <span style={{fontFamily:HD,fontSize:11,color:"#a89070",width:30}}>{s}</span>
      <div style={{display:"flex",gap:3}}>{SCORE_ARRAY.map(sc=>{const sel=a[s]===sc;const used=Object.entries(a).some(([k,v])=>v===sc&&k!==s);return <button key={sc} onClick={()=>assign(s,sc)} disabled={used} style={{width:34,height:26,borderRadius:4,border:sel?"2px solid #c8a040":"1px solid #3a2e1e",background:sel?"#3a2a10":used?"#0a0806":"#1a1510",color:sel?"#c8a040":used?"#3a3020":"#a89070",fontSize:12,fontWeight:sel?700:400,cursor:used?"default":"pointer",fontFamily:HD}}>{sc}</button>})}</div>
      {a[s]&&<span style={{fontSize:11,color:"#c8a040",fontFamily:HD}}>({fm(gm(a[s]))})</span>}
    </div>))}
    <button onClick={()=>onDone(STAT_NAMES.map(s=>a[s]))} disabled={!ok} style={{marginTop:6,background:ok?"#3a2a10":"#1a1510",border:`1px solid ${ok?"#6a5020":"#2a2015"}`,borderRadius:6,color:ok?"#e8c050":"#4a3a20",padding:"6px 16px",cursor:ok?"pointer":"default",fontFamily:HD,fontSize:12,fontWeight:700}}>Confirm</button>
  </div>);
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
